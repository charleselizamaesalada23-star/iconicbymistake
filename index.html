<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra-Fast Spotify Style Liquid Glass Player</title>

<style>
:root {
    --neon-cyan: #00f5ff;
    --neon-purple: #9d4edf;
    --text-active: #ffffff;
    --text-muted: rgba(255, 255, 255, 0.25);
    --text-adjacent: rgba(255, 255, 255, 0.65);
}

/* Butter-smooth background aurora animation */
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 50% 0%, #1e1145, #0b0f19, #02040a);
    background-size: 140% 140%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, sans-serif;
    color: white;
    padding: 20px;
    box-sizing: border-box;
    overflow: hidden;
}

/* Hyper-polished neon glassmorphism card */
.glass {
    width: 100%;
    max-width: 480px;
    padding: 35px 25px;
    border-radius: 32px;
    background: rgba(10, 15, 30, 0.55);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                0 0 60px rgba(0, 245, 255, 0.05),
                0 0 100px rgba(157, 78, 223, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
    box-sizing: border-box;
    position: relative;
}

h3 {
    margin: 0 0 5px 0;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--neon-cyan), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub-header {
    font-size: 0.85rem;
    color: var(--text-adjacent);
    margin-bottom: 25px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
}

/* Sleek Grid Inputs */
.search-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
}

.search-input {
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(255, 255, 255, 0.04);
    color: white;
    font-size: 14px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

.search-input:focus {
    border-color: var(--neon-cyan);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 15px rgba(0, 245, 255, 0.15);
}

/* Futuristic File Picker Button */
.file-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05));
    border: 1px dashed rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    cursor: pointer;
    margin-bottom: 15px;
    font-weight: 600;
    font-size: 14px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

.file-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
}

input[type="file"] {
    display: none;
}

.control-btn {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    box-sizing: border-box;
    cursor: pointer;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    color: white;
    box-shadow: 0 8px 25px rgba(0, 245, 255, 0.2);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.control-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(157, 78, 223, 0.4);
    filter: brightness(1.1);
}

select {
    margin-top: 12px;
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    background: rgba(15, 22, 42, 0.6);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.08);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    backdrop-filter: blur(10px);
}

.status {
    margin: 15px 0 5px 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--neon-cyan);
    opacity: 0.9;
    font-weight: 700;
}

/* Premium Cinematic Lyrics Window */
.lyrics {
    margin-top: 20px;
    padding: 110px 0; /* Creates cinematic center focal area */
    border-radius: 20px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.03);
    height: 280px;
    overflow-y: hidden; /* Prevent manual raw scrollbars from breaking elegance */
    text-align: center;
    position: relative;
    box-sizing: border-box;
    pointer-events: none; /* Smooth automated navigation focus */
}

/* Lyric Lines Transitions - Instant Spotify Snappiness */
.lyric-wrapper {
    transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
    will-change: transform;
}

.lyric-line {
    padding: 12px 20px;
    margin: 2px 0;
    font-size: 16px;
    line-height: 1.4;
    font-weight: 500;
    color: var(--text-muted);
    transition: color 0.15s ease, transform 0.15s cubic-bezier(0.1, 0.9, 0.2, 1), filter 0.15s ease;
    transform: scale(0.95);
    filter: blur(0.5px);
    will-change: transform, color, filter;
}

/* Spotify / Apple Music Active Glowing States */
.lyric-line.active {
    color: var(--text-active);
    font-weight: 700;
    font-size: 20px;
    transform: scale(1.03);
    filter: blur(0px);
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 
                 0 0 30px rgba(0, 245, 255, 0.2);
}

.lyric-line.adjacent {
    color: var(--text-adjacent);
    transform: scale(0.98);
    filter: blur(0px);
}

audio {
    width: 100%; 
    margin-top: 20px;
    border-radius: 12px;
    opacity: 0.15;
    transition: opacity 0.3s;
}
audio:hover, audio:focus {
    opacity: 0.9;
}
</style>
</head>
<body>

<div class="glass">
    <h3>Liquid Glass Engine</h3>
    <div class="sub-header">Spotify Speed Edition</div>

    <div class="search-container">
        <input type="text" id="trackTitle" class="search-input" placeholder="Song Title" value="Touch">
        <input type="text" id="trackArtist" class="search-input" placeholder="Artist" value="KATSEYE">
    </div>
    <button class="control-btn" style="margin-bottom: 12px;" onclick="fetchLyrics()">🔍 Find Synced Lyrics</button>

    <label for="fileInput" class="file-btn" id="fileLabel">📁 Drop or Select MP3 Track</label>
    <input type="file" id="fileInput" accept=".mp3">

    <button class="control-btn" onclick="playSong()">▶ Stream Performance</button>

    <select id="language" onchange="changeLanguage()">
        <option value="touch" selected>Touch (Official Debut Track)</option>
        <option value="iconic">Iconic by Mistake (Instant-Sync)</option>
        <option value="pinky">Pinky Up (Instant-Sync)</option>
        <option value="mia">M.I.A (Instant-Sync)</option>
        <option value="en">Demo English Track</option>
        <option value="fil">Demo Filipino Track</option>
    </select>

    <div class="status" id="status">Engine Ready</div>

    <div class="lyrics" id="lyricsBox">
        <div class="lyric-wrapper" id="lyricWrapper"></div>
    </div>

    <audio id="audio" controls></audio>
</div>

<script>
let audio = document.getElementById("audio");
let statusText = document.getElementById("status");
let lyricsBox = document.getElementById("lyricsBox");
let lyricWrapper = document.getElementById("lyricWrapper");
let fileInput = document.getElementById("fileInput");
let fileLabel = document.getElementById("fileLabel");

let timedLyrics = [];
let lastActiveIndex = -1;

fileInput.addEventListener("change", function () {
    let file = this.files[0];
    if (!file) return;

    if (file.name.toLowerCase().endsWith(".mp3")) {
        audio.src = URL.createObjectURL(file);
        statusText.innerText = "⚡ Track Loaded Successfully";
        fileLabel.innerText = "🎵 " + file.name;
    } else {
        statusText.innerText = "❌ Denied: Requires .MP3 File Format";
        this.value = "";
    }
});

function playSong() {
    if (!audio.src) {
        statusText.innerText = "❌ Load an MP3 Track First";
        return;
    }
    audio.play();
    statusText.innerText = "⚡ Live Spotify Sync Active";
}

// Rapid TimeUpdate Tracking - Instant calculations
audio.addEventListener("timeupdate", () => {
    if (timedLyrics.length === 0) return;

    let currentTime = audio.currentTime;
    let activeIndex = -1;

    // Fast-search approach to instantly find matching lyric line index
    for (let i = 0; i < timedLyrics.length; i++) {
        if (currentTime >= timedLyrics[i].time) {
            activeIndex = i;
        } else {
            break;
        }
    }

    if (activeIndex !== -1 && activeIndex !== lastActiveIndex) {
        let lines = lyricWrapper.children;
        
        // Remove active class from old lines quickly
        if (lastActiveIndex !== -1) {
            if (lines[lastActiveIndex]) lines[lastActiveIndex].className = "lyric-line";
            if (lines[lastActiveIndex - 1]) lines[lastActiveIndex - 1].className = "lyric-line";
            if (lines[lastActiveIndex + 1]) lines[lastActiveIndex + 1].className = "lyric-line";
        }

        // Apply new focused classes instantly
        if (lines[activeIndex]) lines[activeIndex].className = "lyric-line active";
        if (lines[activeIndex - 1]) lines[activeIndex - 1].className = "lyric-line adjacent";
        if (lines[activeIndex + 1]) lines[activeIndex + 1].className = "lyric-line adjacent";

        lastActiveIndex = activeIndex;

        // Snappy Spotify Style Transformation Scroll
        let activeLine = lines[activeIndex];
        if (activeLine) {
            let offset = activeLine.offsetTop - 15;
            lyricWrapper.style.transform = `translate3d(0, -${offset}px, 0)`;
        }
    }
});

function parseLRC(lrcText) {
    timedLyrics = [];
    lyricWrapper.innerHTML = "";
    lastActiveIndex = -1;
    lyricWrapper.style.transform = `translate3d(0, 0, 0)`;
    
    const lines = lrcText.split(/\r?\n/);
    const timestampRegex = /\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/g;

    lines.forEach(line => {
        let text = line.replace(timestampRegex, "").trim();
        timestampRegex.lastIndex = 0;
        let match;
        
        while ((match = timestampRegex.exec(line)) !== null) {
            let minutes = parseInt(match[1], 10);
            let seconds = parseInt(match[2], 10);
            let milliseconds = match[3] ? parseInt(match[3], 10) : 0;
            if (match[3] && match[3].length === 2) milliseconds *= 10;

            let totalTimeSeconds = (minutes * 60) + seconds + (milliseconds / 1000);
            timedLyrics.push({ time: totalTimeSeconds, text: text });
        }
    });

    timedLyrics.sort((a, b) => a.time - b.time);

    if (timedLyrics.length > 0) {
        timedLyrics.forEach((item) => {
            let lineDiv = document.createElement("div");
            lineDiv.className = "lyric-line";
            lineDiv.textContent = item.text || "• • •";
            lyricWrapper.appendChild(lineDiv);
        });
    } else {
        lines.forEach(line => {
            if(line.trim() === "") return;
            let lineDiv = document.createElement("div");
            lineDiv.className = "lyric-line adjacent";
            lineDiv.textContent = line;
            lyricWrapper.appendChild(lineDiv);
        });
    }
}

async function fetchLyrics() {
    let title = document.getElementById("trackTitle").value.trim().toLowerCase();
    let artist = document.getElementById("trackArtist").value.trim();
    if (!title) return;

    statusText.innerText = "📡 Querying Satellite DB...";
    try {
        let url = `https://lrclib.net/api/search?track_name=${encodeURIComponent(title)}`;
        if (artist) url += `&artist_name=${encodeURIComponent(artist)}`;

        let response = await fetch(url);
        let data = await response.json();

        if (data && data.length > 0 && data[0].syncedLyrics) {
            statusText.innerText = "Base Line Connected";
            parseLRC(data[0].syncedLyrics);
        } else {
            fallbackLocal(title);
        }
    } catch (error) {
        fallbackLocal(title);
    }
}

function fallbackLocal(title) {
    if (title.includes("touch")) {
        statusText.innerText = "🔒 Local Ultra-LRC Injector Engaged";
        document.getElementById("language").value = "touch";
        changeLanguage();
    } else if (title.includes("iconic")) {
        statusText.innerText = "🔒 Local Ultra-LRC Injector Engaged";
        document.getElementById("language").value = "iconic";
        changeLanguage();
    } else if (title.includes("pinky")) {
        statusText.innerText = "🔒 Local Ultra-LRC Injector Engaged";
        document.getElementById("language").value = "pinky";
        changeLanguage();
    } else if (title.includes("mia") || title.includes("m.i.a")) {
        statusText.innerText = "🔒 Local Ultra-LRC Injector Engaged";
        document.getElementById("language").value = "mia";
        changeLanguage();
    } else {
        statusText.innerText = "❌ Missing Sync Metadata";
    }
}
